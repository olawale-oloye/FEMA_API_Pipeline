fail_fast: true

repos:

- repo: local
  hooks:

  - id: ruff
    name: ruff
    entry: python -m ruff check .
    language: system
    types: [python]

  - id: ruff-format
    name: ruff-format
    entry: python -m ruff format .
    language: system
    types: [python]

  - id: mypy
    name: mypy
    entry: python -m mypy
    language: system
    types: [python]
